name: financeiro_app
description: App de controle financeiro pessoal

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  fl_chart: ^0.69.2

  # Gerenciamento de estado
  provider: ^6.1.2

  # Requisições HTTP para o backend Node.js
  http: ^1.2.1

  # Armazenamento local (token de sessão)
  shared_preferences: ^2.2.3

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true